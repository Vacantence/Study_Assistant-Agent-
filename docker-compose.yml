version: "3.9"

services:
  streamlit:
    build: .
    container_name: study-assistant
    ports:
      - "8501:8501"
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./knowledge_cache.db:/app/knowledge_cache.db
      - ./outputs:/app/outputs
    command: >
      sh -c "streamlit run app.py --server.port=8501 --server.address=0.0.0.0
      & uvicorn src.api.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
